<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>庫存追蹤｜國小參考書・版版補充</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{
  --bg:#F1F3F7;--sur:#fff;--brd:#E3E6ED;
  --txt:#1A2030;--sub:#64748B;--lgt:#94A3B8;
  --red:#DC2626;--rbg:#FEF2F2;--rbd:#FECACA;
  --org:#D97706;--obg:#FFFBEB;--obd:#FDE68A;
  --grn:#059669;--gbg:#ECFDF5;--gbd:#6EE7B7;
  --blu:#1D4ED8;--bbg:#EFF6FF;--bbd:#93C5FD;
  --pur:#7C3AED;--pbg:#F5F3FF;--pbd:#C4B5FD;
  --cya:#0369A1;--cbg:#E0F2FE;
  --hdr:#1E2538;--acc:#3B82F6;
  --v31:#7C3AED;--v41:#1D4ED8;--v51:#065F46;--v21:#92400E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh}

.hdr{background:var(--hdr);border-bottom:3px solid var(--acc);padding:11px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  position:sticky;top:0;z-index:300}
.hdr-title{font-size:16px;font-weight:700;color:#fff}
.hdr-sub{font-size:11px;color:#94A3B8;margin-top:1px}
.hdr-btns{display:flex;gap:7px;flex-wrap:wrap}
.hbtn{border:none;padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.hbtn:hover{opacity:.82}
.hbtn-inv{background:var(--acc);color:#fff}
.hbtn-rev{background:#6D28D9;color:#fff}
#fInv,#fRev{display:none}

/* TABS */
.tabs{background:var(--sur);border-bottom:2px solid var(--brd);display:flex;padding:0 24px;position:sticky;top:51px;z-index:200}
.tab{padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:none;font-family:inherit;
  color:var(--sub);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--txt)}
.tab.ref{color:var(--org);border-bottom-color:var(--org)}
.tab.nsp{color:var(--cya);border-bottom-color:var(--cya)}
.tab.sup{color:var(--grn);border-bottom-color:var(--grn)}
.tcnt{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}
.tab.ref .tcnt{background:var(--obg);color:var(--org)}
.tab.nsp .tcnt{background:var(--cbg);color:var(--cya)}
.tab.sup .tcnt{background:var(--gbg);color:var(--grn)}

/* LEGEND */
.legend{background:#FFFAF0;border-bottom:1px solid var(--obd);padding:6px 24px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--sub)}
.li{display:flex;align-items:center;gap:4px}

/* SORT BAR */
.srtbar{background:var(--sur);border-bottom:1px solid var(--brd);padding:7px 24px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.srt-lbl{font-size:12px;font-weight:700;color:var(--sub);white-space:nowrap}
.srt-btns{display:flex;border:1px solid var(--brd);border-radius:7px;overflow:hidden}
.srtb{padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;
  background:#fff;color:var(--sub);font-family:inherit;transition:all .15s;
  border-right:1px solid var(--brd);white-space:nowrap}
.srtb:last-child{border-right:none}
.srtb:hover{background:#F1F5F9;color:var(--txt)}
.srtb.on{background:var(--hdr);color:#fff;font-weight:700}

/* CTRL */
.ctrl{background:var(--sur);border-bottom:1px solid var(--brd);padding:8px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-lbl{font-size:12px;font-weight:700;color:var(--sub);white-space:nowrap}
.thbox{display:flex;align-items:center;gap:5px;border:1px solid var(--brd);border-radius:7px;padding:5px 10px;background:#FAFBFD}
.thbox label{font-size:11px;font-weight:700;color:var(--sub)}
.thbox input{width:62px;padding:3px 5px;border:1px solid var(--brd);border-radius:4px;font-size:12px;font-family:inherit;text-align:center}
.thbox input:focus{outline:none;border-color:var(--acc)}
.ap{padding:4px 9px;border-radius:4px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:inherit;color:#fff}

/* FILTER BAR */
.fbar{background:var(--sur);border-bottom:1px solid var(--brd);padding:7px 24px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fb{padding:4px 12px;border-radius:20px;border:1px solid var(--brd);background:#fff;font-size:12px;cursor:pointer;font-family:inherit;color:var(--sub);transition:all .15s;white-space:nowrap}
.fb:hover{border-color:var(--acc);color:var(--acc)}
.fb.on{background:var(--hdr);color:#fff;border-color:var(--hdr);font-weight:700}
.fsep{color:var(--brd);font-size:16px}
.srch{padding:5px 10px;border:1px solid var(--brd);border-radius:6px;font-size:13px;font-family:inherit;width:180px;outline:none;margin-left:auto}
.srch:focus{border-color:var(--acc)}

/* SEM */
.sem{display:flex;align-items:center;gap:8px;margin-left:auto}
.sem-btns{display:flex;border:1px solid var(--brd);border-radius:7px;overflow:hidden}
.sb{padding:4px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:#fff;color:var(--sub);font-family:inherit;transition:all .15s;border-right:1px solid var(--brd)}
.sb:last-child{border-right:none}
.sb.up{background:var(--blu);color:#fff}
.sb.dn{background:var(--grn);color:#fff}
.sb.all{background:var(--hdr);color:#fff}

/* MAIN */
.main{padding:16px 24px}
.panel{display:none}.panel.active{display:block}

/* SUBJECT CARDS */
.subj-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.scard{background:var(--sur);border:2px solid var(--brd);border-radius:10px;padding:12px 16px;cursor:pointer;
  transition:all .15s;min-width:110px;flex:1;max-width:170px;text-align:center;user-select:none}
.scard:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.scard.a-ref{border-color:var(--org);background:var(--obg)}
.scard.a-nsp{border-color:var(--cya);background:var(--cbg)}
.scard.a-sup{border-color:var(--grn);background:var(--gbg)}
.scard-name{font-size:14px;font-weight:700;margin-bottom:6px}
.scard-stats{display:flex;justify-content:center;gap:5px;flex-wrap:wrap}
.ss{font-size:11px;font-weight:700;padding:2px 6px;border-radius:8px}
.ss-r{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.ss-o{background:var(--obg);color:var(--org);border:1px solid var(--obd)}
.ss-g{background:var(--gbg);color:var(--grn);border:1px solid var(--gbd)}
.ss-p{background:var(--pbg);color:var(--pur);border:1px solid var(--pbd)}
.scard-tot{font-size:10px;color:var(--lgt);margin-top:4px}

/* TABLE SECTION */
.tsec{background:var(--sur);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:12px}
.tsec-hdr{padding:11px 16px;background:#FAFBFD;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.tsec-title{font-size:14px;font-weight:700;flex:1}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px}
.b-r{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.b-o{background:var(--obg);color:var(--org);border:1px solid var(--obd)}
.b-p{background:var(--pbg);color:var(--pur);border:1px solid var(--pbd)}
.b-g{background:#F1F5F9;color:var(--sub);border:1px solid var(--brd)}

table{width:100%;border-collapse:collapse}
thead th{background:#F8F9FB;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;
  letter-spacing:.3px;padding:7px 13px;text-align:left;border-bottom:1px solid var(--brd);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--brd);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F7F9FC}
tbody tr.row-alert{background:#FFFBF5}
tbody tr.row-alert:hover{background:#FFF7ED}
tbody tr.row-scrap{background:#FFF8F8}
tbody tr.row-scrap:hover{background:#FFF0F0}
td{padding:9px 13px;font-size:13px;vertical-align:middle}
.pn{font-weight:600;line-height:1.4}
.psku{font-size:10px;color:var(--lgt);font-family:monospace;margin-top:1px}
.subj-tag{font-size:10px;color:var(--acc);font-weight:700;padding:1px 5px;background:var(--bbg);border-radius:3px;margin-right:5px}

/* version tags */
.vtag{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;color:#fff;white-space:nowrap;margin:1px}
.v31{background:var(--v31)}.v41{background:var(--v41)}.v51{background:var(--v51)}.v21{background:var(--v21)}.vx{background:var(--lgt)}
.t-scrap{background:#B91C1C!important}.t-mix{background:#059669!important}.t-lim{background:#92400E!important}

/* stock */
.stk{min-width:120px}
.sw{display:flex;align-items:center;gap:6px}
.sn{font-size:15px;font-weight:700;min-width:50px;text-align:right}
.n-z{color:var(--red)}.n-l{color:var(--org)}.n-o{color:var(--grn)}.n-s{color:var(--red);text-decoration:line-through;opacity:.55}
.bar{flex:1;height:6px;background:var(--brd);border-radius:3px;overflow:hidden;min-width:40px}
.bi{height:100%;border-radius:3px}
.bi-r{background:var(--red)}.bi-o{background:var(--org)}.bi-g{background:var(--grn)}.bi-s{background:var(--red);opacity:.3}

/* threshold */
.tiw{display:flex;align-items:center;gap:3px}
.ti{width:54px;padding:2px 4px;border:1px solid var(--brd);border-radius:4px;font-size:11px;font-family:inherit;text-align:center}
.ti:focus{outline:none;border-color:var(--acc)}

/* pill */
.pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:11px;white-space:nowrap}
.p-r{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.p-o{background:var(--obg);color:var(--org);border:1px solid var(--obd)}
.p-g{background:var(--gbg);color:var(--grn);border:1px solid var(--gbd)}
.p-p{background:var(--pbg);color:var(--pur);border:1px solid var(--pbd)}
.p-s{background:var(--rbg);color:#991B1B;border:1px solid var(--rbd);text-decoration:line-through}

/* expand btn */
.exp-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--acc);padding:2px 6px;border-radius:4px;font-family:inherit;font-weight:600}
.exp-btn:hover{background:var(--bbg)}
.vd{display:none;padding:6px 13px 10px 32px;background:#FAFBFD;border-top:1px solid var(--brd)}
.vd.open{display:block}
.vd-row{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:12px;border-bottom:1px solid #F1F5F9}
.vd-row:last-child{border-bottom:none}
.vd-ver{min-width:60px}

.use{font-size:10px;padding:1px 5px;border-radius:3px}
.u-s{background:var(--bbg);color:var(--blu)}.u-t{background:var(--pbg);color:var(--pur)}
.empty{text-align:center;padding:40px;color:var(--lgt);background:var(--sur);border-radius:10px;border:1px solid var(--brd)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--hdr);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,.25);display:none}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">📚 國小參考書・版版補充｜庫存追蹤</div>
    <div class="hdr-sub" id="hdrSub">內建資料：庫存 2026.06.09 ／ 修訂對照 115(一)</div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn hbtn-inv" onclick="document.getElementById('fInv').click()">📂 載入庫存 (.xls / .txt)</button>
    <button class="hbtn hbtn-rev" onclick="document.getElementById('fRev').click()">📋 載入修訂對照表 (.xlsx)</button>
    <input type="file" id="fInv" accept=".xls,.xlsx,.csv,.txt" onchange="loadInv(event)">
    <input type="file" id="fRev" accept=".xlsx" onchange="loadRev(event)">
  </div>
</div>

<div class="tabs">
  <button class="tab ref" id="tab-ref" onclick="switchTab('ref')">📖 參考書 <span class="tcnt" id="cnt-ref">—</span></button>
  <button class="tab" id="tab-nsp" onclick="switchTab('nsp')">📋 非賣品 <span class="tcnt" id="cnt-nsp">—</span></button>
  <button class="tab" id="tab-sup" onclick="switchTab('sup')">📝 版版補充 <span class="tcnt" id="cnt-sup">—</span></button>
</div>

<div class="legend">
  <strong>版次：</strong>
  <div class="li"><span class="vtag t-scrap" style="font-size:10px">41 🗑</span>報廢</div>
  <div class="li"><span class="vtag t-mix" style="font-size:10px">41 ✓</span>混用／新版</div>
  <div class="li"><span class="vtag t-lim" style="font-size:10px">41 ⚠</span>限區</div>
  <div class="li"><span class="vtag v51" style="font-size:10px">51</span>無標示</div>
  <div class="li" style="margin-left:8px;color:#92400E">版版：加總可用版次庫存</div>
</div>

<div class="srtbar">
  <span class="srt-lbl">排序方式</span>
  <div class="srt-btns">
    <button class="srtb on" id="srt-default" onclick="setSort('default',this)">📋 品項順序</button>
    <button class="srtb" id="srt-asc"     onclick="setSort('asc',this)">📈 庫存 少→多</button>
    <button class="srtb" id="srt-desc"    onclick="setSort('desc',this)">📉 庫存 多→少</button>
    <button class="srtb" id="srt-ratio"   onclick="setSort('ratio',this)">⚠ 危險比例 低→高</button>
  </div>
  <span style="font-size:11px;color:var(--lgt)">危險比例 = 庫存 ÷ 警戒值，越低越需要加刷</span>
</div>
<div class="ctrl">
  <span class="ctrl-lbl">⚙ 警戒值</span>
  <div class="thbox" style="border-color:var(--obd);background:var(--obg)">
    <label style="color:var(--org)">參考書：</label>
    <input type="number" id="gRef" value="300" min="1" style="border-color:var(--obd)">
    <span style="font-size:11px;color:var(--sub)">本</span>
    <button class="ap" style="background:var(--org)" onclick="applyTh('ref')">套用</button>
  </div>
  <div class="thbox" style="border-color:var(--obd);background:var(--obg)">
    <label style="color:var(--cya)">非賣品：</label>
    <input type="number" id="gNsp" value="100" min="1" style="border-color:var(--obd)">
    <span style="font-size:11px;color:var(--sub)">本</span>
    <button class="ap" style="background:var(--cya)" onclick="applyTh('nsp')">套用</button>
  </div>
  <div class="thbox" style="border-color:var(--gbd);background:var(--gbg)">
    <label style="color:var(--grn)">版版補充：</label>
    <input type="number" id="gSup" value="500" min="1" style="border-color:var(--gbd)">
    <span style="font-size:11px;color:var(--sub)">本</span>
    <button class="ap" style="background:var(--grn)" onclick="applyTh('sup')">套用</button>
  </div>
  <div class="sem" style="margin-left:auto">
    <span style="font-size:12px;font-weight:700;color:var(--sub)">學期：</span>
    <div class="sem-btns">
      <button class="sb" id="sb-up" onclick="setSem('上學期')">上學期</button>
      <button class="sb" id="sb-dn" onclick="setSem('下學期')">下學期</button>
      <button class="sb all" id="sb-all" onclick="setSem('all')">全部</button>
    </div>
  </div>
</div>

<div class="fbar">
  <button class="fb on" onclick="setF('all',this)">全部</button>
  <button class="fb" onclick="setF('庫存耗盡',this)">庫存耗盡</button>
  <button class="fb" onclick="setF('低庫存',this)">低庫存</button>
  <button class="fb" onclick="setF('正常',this)">正常</button>
  <button class="fb" onclick="setF('報廢有庫存',this)">⚠ 報廢有庫存</button>
  <span class="fsep">|</span>
  <button class="fb" onclick="setF('學用',this)">學用</button>
  <button class="fb" onclick="setF('教用',this)">教用</button>
  <input class="srch" id="sq" type="text" placeholder="🔍 搜尋名稱或料號…" oninput="render()">
</div>

<div class="main">
  <div class="panel active" id="panel-ref">
    <div class="subj-row" id="sr-ref"></div>
    <div id="det-ref"></div>
  </div>
  <div class="panel" id="panel-nsp">
    <div class="subj-row" id="sr-nsp"></div>
    <div id="det-nsp"></div>
  </div>
  <div class="panel" id="panel-sup">
    <div class="subj-row" id="sr-sup"></div>
    <div id="det-sup"></div>
  </div>
</div>
<div id="toast"></div>

// ── STATE ──
let activeTab = 'ref';
let activeSem = 'all';
let activeFilter = 'all';
let thresholds = {};
let activeSubj = { ref:null, nsp:null, sup:null };
let invDate = '2026.06.10';
let revLabel = '115(一)';
let invLoaded = false, revLoaded = false;
let activeSort = 'default'; // default | asc | desc | ratio

// ── REV HELPERS ──
function getT(sku, ver, cat) {
  if (cat === '版版補充') {
    const m = REV.supp[sku];
    return m ? (m[String(ver)] || null) : null;
  }
  const m = REV.ref[sku];
  if (!m) return null;
  const vn  = parseInt(ver)       || 0;
  const vo  = parseInt(m.old_ver) || 0;
  const vne = parseInt(m.new_ver) || 999;
  if (vn >= vne) return '新版';
  if (vn === vo) return m.treatment || null;
  if (vn < vo)  return '報廢';
  return null;
}
function isScrap(sku, ver, cat) { return getT(sku, ver, cat) === '報廢'; }

// ── THRESHOLD ──
function getTh(sku, tab) {
  if (thresholds[sku] != null) return thresholds[sku];
  if (tab === 'ref') return parseInt(document.getElementById('gRef').value) || 300;
  if (tab === 'nsp') return parseInt(document.getElementById('gNsp').value) || 100;
  return parseInt(document.getElementById('gSup').value) || 500;
}

function stOf(avail, th, scrapped) {
  if (scrapped) return '報廢';
  if (avail === 0) return '庫存耗盡';
  if (avail < th)  return '低庫存';
  return '正常';
}

// 版版補充 / 非賣品：加總可用版次
function multiSt(prod, tab) {
  const th = getTh(prod.sku, tab);
  const cat = tab === 'sup' ? '版版補充' : '參考書';
  const usable = prod.versions
    .filter(v => !isScrap(prod.sku, v.ver, cat))
    .reduce((s, v) => s + v.avail, 0);
  const st = usable === 0 ? '庫存耗盡' : usable < th ? '低庫存' : '正常';
  return { st, usable, th };
}

// ── CONTROLS ──
function switchTab(t) {
  activeTab = t;
  ['ref','nsp','sup'].forEach(id => {
    document.getElementById('panel-'+id).classList.toggle('active', id === t);
    const el = document.getElementById('tab-'+id);
    el.className = 'tab' + (id === t ? ' '+id : '');
  });
  render();
}

function setSem(s) {
  activeSem = s;
  document.querySelectorAll('.sb').forEach(b => b.className = 'sb');
  const map = {'上學期':'sb-up','下學期':'sb-dn','all':'sb-all'};
  const cls = {'上學期':'up','下學期':'dn','all':'all'};
  document.getElementById(map[s]).classList.add(cls[s]);
  render();
}

function setF(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function setSort(s, btn) {
  activeSort = s;
  document.querySelectorAll('.srtb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function applyTh(type) {
  const ids = {ref:'gRef', nsp:'gNsp', sup:'gSup'};
  const cats = {ref:'參考書', nsp:'nsp', sup:'版版補充'};
  const v = parseInt(document.getElementById(ids[type]).value) || 300;
  if (type === 'nsp') {
    PRODS.filter(p => p.category === '參考書' && p.name.includes('非賣品')).forEach(p => { delete thresholds[p.sku]; });
  } else {
    PRODS.filter(p => p.category === cats[type] && (type !== 'ref' || !p.name.includes('非賣品'))).forEach(p => { delete thresholds[p.sku]; });
  }
  render(); toast('✅ 警戒值已套用 → ' + v + ' 本');
}

function setRowTh(sku, val) {
  const v = parseInt(val);
  if (v > 0) { thresholds[sku] = v; render(); }
}

function clickSubj(tab, subj) {
  activeSubj[tab] = activeSubj[tab] === subj ? null : subj;
  render();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => { el.style.display='none'; }, 2500);
}

// ── FILTER ──
const COND_FILTERS = ['庫存耗盡','低庫存','正常','報廢有庫存'];

function prodsFor(tab) {
  const q = document.getElementById('sq').value.trim().toLowerCase();
  return PRODS.filter(p => {
    // category
    if (tab === 'ref') {
      if (p.category !== '參考書' || p.name.includes('非賣品')) return false;
    } else if (tab === 'nsp') {
      if (p.category !== '參考書' || !p.name.includes('非賣品')) return false;
    } else {
      if (p.category !== '版版補充') return false;
    }
    // semester
    if (activeSem !== 'all' && p.semester !== '通用' && p.semester !== activeSem) return false;
    // search
    if (q && !p.name.toLowerCase().includes(q) && !p.sku.includes(q)) return false;
    // usage filter
    if (activeFilter === '學用') return tab === 'nsp' ? true : p.usage === '學用';
    if (activeFilter === '教用') return tab === 'nsp' ? false : p.usage === '教用';
    if (activeFilter === 'all') return true;
    // status filters
    if (activeFilter === '報廢有庫存') {
      return p.versions.some(v => isScrap(p.sku, v.ver, tab==='sup'?'版版補充':'參考書') && v.avail > 0);
    }
    if (tab === 'ref') {
      const th = getTh(p.sku, 'ref');
      return p.versions.some(v => stOf(v.avail, th, isScrap(p.sku, v.ver, '參考書')) === activeFilter);
    }
    return multiSt(p, tab).st === activeFilter;
  });
}

// ── SORT ──
const VOL_ORDER  = ['首','1上','1下','2上','2下','3上','3下','4上','4下','5上','5下','6上','6下'];
const TYPE_ORDER = ['學習自修','自修式評量','學習評量','麻辣講義','測驗卷','練習簿','語文習寫簿','注音習寫簿','重點複習'];
const SUBJ_SEQ   = ['國語','數學','社會','自然','生活','英語','其他'];
function getDisplayStock(p, tab) {
  // 取得用來排序的庫存數字
  if (tab === 'ref') {
    return p.versions.length ? p.versions[0].avail : 0;
  }
  // nsp / sup: 加總可用版次
  const cat = tab === 'sup' ? '版版補充' : '參考書';
  return p.versions.filter(v => !isScrap(p.sku, v.ver, cat)).reduce((s,v)=>s+v.avail, 0);
}

function getRatio(p, tab) {
  const stock = getDisplayStock(p, tab);
  const th = getTh(p.sku, tab);
  return th > 0 ? stock / th : 999;
}

function sortProds(arr, crossSubj, tab) {
  const si = p => { const i=SUBJ_SEQ.indexOf(p.subject);  return i<0?99:i; };
  const vi = p => { const i=VOL_ORDER.indexOf(p.vol);     return i<0?99:i; };
  const ti = p => { const i=TYPE_ORDER.indexOf(p.type);   return i<0?99:i; };

  if (activeSort === 'asc') {
    arr.sort((a,b) => {
      const diff = getDisplayStock(a,tab) - getDisplayStock(b,tab);
      if (diff !== 0) return diff;
      if (crossSubj && si(a)!==si(b)) return si(a)-si(b);
      return vi(a)!==vi(b) ? vi(a)-vi(b) : ti(a)-ti(b);
    });
  } else if (activeSort === 'desc') {
    arr.sort((a,b) => {
      const diff = getDisplayStock(b,tab) - getDisplayStock(a,tab);
      if (diff !== 0) return diff;
      if (crossSubj && si(a)!==si(b)) return si(a)-si(b);
      return vi(a)!==vi(b) ? vi(a)-vi(b) : ti(a)-ti(b);
    });
  } else if (activeSort === 'ratio') {
    arr.sort((a,b) => {
      const diff = getRatio(a,tab) - getRatio(b,tab);
      if (Math.abs(diff) > 0.001) return diff;
      if (crossSubj && si(a)!==si(b)) return si(a)-si(b);
      return vi(a)!==vi(b) ? vi(a)-vi(b) : ti(a)-ti(b);
    });
  } else {
    // default: 科目 → 年級 → 種類
    arr.sort((a,b) => {
      if (crossSubj && si(a)!==si(b)) return si(a)-si(b);
      return vi(a)!==vi(b) ? vi(a)-vi(b) : ti(a)-ti(b);
    });
  }
  return arr;
}

// ── RENDER ──
function render() {
  document.getElementById('hdrSub').textContent =
    `庫存：${invDate}${invLoaded?'':'（內建）'}　修訂：${revLabel}${revLoaded?'':'（內建）'}`;
  ['ref','nsp','sup'].forEach(tab => {
    const prods = prodsFor(tab);
    document.getElementById('cnt-'+tab).textContent = prods.length;
    renderPanel(tab, prods);
  });
}

function renderPanel(tab, prods) {
  const isCrossSubj = COND_FILTERS.includes(activeFilter) || activeFilter === 'all';
  const isMultiVer  = tab === 'nsp' || tab === 'sup'; // 多版次加總邏輯
  const cat = tab === 'sup' ? '版版補充' : '參考書';
  const tabActCls   = { ref:'a-ref', nsp:'a-nsp', sup:'a-sup' };

  // ── Subject cards ──
  const subjects = [...new Set(
    PRODS.filter(p => {
      if (tab==='ref') return p.category==='參考書' && !p.name.includes('非賣品');
      if (tab==='nsp') return p.category==='參考書' && p.name.includes('非賣品');
      return p.category==='版版補充';
    }).map(p => p.subject)
  )].sort((a,b) => SUBJ_SEQ.indexOf(a) - SUBJ_SEQ.indexOf(b));

  const allTabProds = PRODS.filter(p => {
    if (tab==='ref') return p.category==='參考書' && !p.name.includes('非賣品') && (activeSem==='all'||p.semester==='通用'||p.semester===activeSem);
    if (tab==='nsp') return p.category==='參考書' && p.name.includes('非賣品') && (activeSem==='all'||p.semester==='通用'||p.semester===activeSem);
    return p.category==='版版補充' && (activeSem==='all'||p.semester==='通用'||p.semester===activeSem);
  });

  let cardsHtml = '';
  for (const subj of subjects) {
    const sp = allTabProds.filter(p => p.subject === subj);
    let zero=0, low=0, scrap=0, ok=0;
    for (const p of sp) {
      const hasSc = p.versions.some(v => isScrap(p.sku, v.ver, cat) && v.avail > 0);
      if (hasSc) scrap++;
      const st = isMultiVer ? multiSt(p, tab).st
        : (() => { const th=getTh(p.sku,tab); return p.versions.length ? stOf(p.versions[0].avail, th, isScrap(p.sku, p.versions[0].ver, cat)) : '正常'; })();
      if (st==='庫存耗盡') zero++;
      else if (st==='低庫存') low++;
      else ok++;
    }
    const isAct = activeSubj[tab] === subj;
    cardsHtml += `<div class="scard${isAct?' '+tabActCls[tab]:''}" onclick="clickSubj('${tab}','${subj}')">
      <div class="scard-name">${subj}</div>
      <div class="scard-stats">
        ${zero>0?`<span class="ss ss-r">耗盡 ${zero}</span>`:''}
        ${low>0?`<span class="ss ss-o">低 ${low}</span>`:''}
        ${scrap>0?`<span class="ss ss-p">報廢 ${scrap}</span>`:''}
        ${zero===0&&low===0&&scrap===0?`<span class="ss ss-g">正常 ${ok}</span>`:''}
      </div>
      <div class="scard-tot">${sp.length} 項</div>
    </div>`;
  }
  document.getElementById('sr-'+tab).innerHTML = cardsHtml;

  // ── Detail table ──
  const detEl = document.getElementById('det-'+tab);

  // Decide what to show
  // isCrossSubj = 狀態篩選(低庫存/耗盡等) 或 全部
  // activeSubj = 使用者有點科目卡片的話，進一步縮小到該科目
  let showProds;
  const curSubj = activeSubj[tab];
  if (isCrossSubj) {
    // 有點科目卡片 → 只顯示該科目；沒點 → 全部
    const filtered = curSubj ? prods.filter(p => p.subject === curSubj) : prods;
    showProds = sortProds([...filtered], !curSubj, tab);
  } else if (!curSubj) {
    detEl.innerHTML = `<div class="empty">👆 點擊上方科目卡片查看明細</div>`;
    return;
  } else {
    showProds = sortProds(prods.filter(p => p.subject === curSubj), false, tab);
  }

  if (!showProds.length) {
    detEl.innerHTML = `<div class="empty">${isCrossSubj ? '目前沒有符合條件的品項 👌' : '此科目無符合條件的品項'}</div>`;
    return;
  }

  // Count badges
  let exCnt=0, lowCnt=0, scrapCnt=0;
  for (const p of showProds) {
    const hasSc = p.versions.some(v => isScrap(p.sku, v.ver, cat) && v.avail > 0);
    if (hasSc) scrapCnt++;
    const st = isMultiVer ? multiSt(p, tab).st
      : (() => { const th=getTh(p.sku,tab); return p.versions.length ? stOf(p.versions[0].avail, th, isScrap(p.sku, p.versions[0].ver, cat)) : '正常'; })();
    if (st==='庫存耗盡') exCnt++;
    else if (st==='低庫存') lowCnt++;
  }

  const title = curSubj ? (curSubj + '　') : (isCrossSubj ? activeFilter : (activeSubj[tab] + '　'));
  const thRow = tab==='ref'
    ? `<th>品項</th><th>用途</th><th>版次</th><th>庫存量</th><th>警戒值</th><th>狀態</th>`
    : `<th>品項</th><th>版次（可用）</th><th>合計可用庫存</th><th>警戒值</th><th>狀態</th>`;

  const rows = showProds.map(p => tab==='ref' ? buildRefRow(p, isCrossSubj) : buildMultiRow(p, tab, isCrossSubj)).join('');

  detEl.innerHTML = `<div class="tsec">
    <div class="tsec-hdr">
      <span class="tsec-title">${title}<span style="font-weight:400;color:var(--sub);font-size:12px">${cat}</span></span>
      ${scrapCnt>0?`<span class="bdg b-p">⚠ 報廢有庫存 ${scrapCnt}</span>`:''}
      ${exCnt>0?`<span class="bdg b-r">耗盡 ${exCnt}</span>`:''}
      ${lowCnt>0?`<span class="bdg b-o">低庫存 ${lowCnt}</span>`:''}
      <span class="bdg b-g">${showProds.length} 項</span>
    </div>
    <table><thead><tr>${thRow}</tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

// ── ROW BUILDERS ──
function vTagHtml(sku, ver, cat) {
  const sc = isScrap(sku, ver, cat);
  const t  = getT(sku, ver, cat);
  let cls = ({31:'v31',41:'v41',51:'v51',21:'v21',42:'v21'}[String(ver)]||'vx');
  let icon = '';
  if (sc)              { cls += ' t-scrap'; icon = ' 🗑'; }
  else if (t==='限區')  { cls += ' t-lim';   icon = ' ⚠'; }
  else if (t==='混用'||t==='新版') { cls += ' t-mix'; icon = ' ✓'; }
  return `<span class="vtag ${cls}">${ver}${icon}</span>`;
}

function pillHtml(st) {
  const m = {庫存耗盡:'p-r',低庫存:'p-o',正常:'p-g',報廢:'p-s'};
  return `<span class="pill ${m[st]||'p-g'}">${st}</span>`;
}

function subjTagHtml(subj, show) {
  return show ? `<span class="subj-tag">${subj}</span>` : '';
}

// 參考書：單版次
function buildRefRow(p, crossSubj) {
  const th = getTh(p.sku, 'ref');
  return p.versions.map(v => {
    const sc = isScrap(p.sku, v.ver, '參考書');
    const st = stOf(v.avail, th, sc);
    const pct = th>0 ? Math.min(100, Math.round(v.avail/th*100)) : 0;
    const snCls = sc?'n-s':st==='庫存耗盡'?'n-z':st==='低庫存'?'n-l':'n-o';
    const barCls = sc?'bi-s':st==='庫存耗盡'?'bi-r':st==='低庫存'?'bi-o':'bi-g';
    const rowCls = (sc&&v.avail>0)?'row-scrap':(st==='低庫存'||st==='庫存耗盡'?'row-alert':'');
    return `<tr class="${rowCls}">
      <td><div class="pn">${subjTagHtml(p.subject,crossSubj)}${p.name}</div><div class="psku">${p.sku}</div></td>
      <td><span class="use ${p.usage==='學用'?'u-s':'u-t'}">${p.usage}</span></td>
      <td>${vTagHtml(p.sku, v.ver, '參考書')}</td>
      <td class="stk"><div class="sw"><span class="sn ${snCls}">${v.avail.toLocaleString()}</span>
        <div class="bar"><div class="bi ${barCls}" style="width:${pct}%"></div></div></div></td>
      <td><div class="tiw"><input class="ti" type="number" value="${th}" min="1"
        onchange="setRowTh('${p.sku}',this.value)"
        onkeydown="if(event.key==='Enter')setRowTh('${p.sku}',this.value)">
        <span style="font-size:10px;color:var(--lgt)">本</span></div></td>
      <td>${pillHtml(st)}</td>
    </tr>`;
  }).join('');
}

// 版版補充 / 非賣品：多版次加總
function buildMultiRow(p, tab, crossSubj) {
  const cat = tab==='sup' ? '版版補充' : '參考書';
  const { st, usable, th } = multiSt(p, tab);
  const totalAvail = p.versions.reduce((s,v)=>s+v.avail,0);
  const hasSc = p.versions.some(v=>isScrap(p.sku,v.ver,cat)&&v.avail>0);
  const pct = th>0 ? Math.min(100,Math.round(usable/th*100)) : 0;
  const snCls = st==='庫存耗盡'?'n-z':st==='低庫存'?'n-l':'n-o';
  const barCls= st==='庫存耗盡'?'bi-r':st==='低庫存'?'bi-o':'bi-g';
  const rowCls= hasSc?'row-scrap':(st==='低庫存'||st==='庫存耗盡'?'row-alert':'');

  // Show only versions with stock (or all if all zero)
  const dispVers = p.versions.filter(v=>v.avail>0);
  const verTagsHtml = (dispVers.length ? dispVers : p.versions)
    .map(v => vTagHtml(p.sku, v.ver, cat)).join(' ');

  const did = `vd_${p.sku}`;
  let detRows = '';
  for (const v of p.versions) {
    if (v.avail===0 && p.versions.some(vv=>vv.avail>0)) continue;
    const sc = isScrap(p.sku, v.ver, cat);
    const t  = getT(p.sku, v.ver, cat);
    let vc = ({31:'v31',41:'v41',51:'v51',21:'v21',42:'v21'}[String(v.ver)]||'vx');
    let icon = '';
    if (sc) { vc+=' t-scrap'; icon=' 🗑'; }
    else if (t==='新版'||t==='混用') { vc+=' t-mix'; icon=' ✓'; }
    detRows += `<div class="vd-row">
      <div class="vd-ver"><span class="vtag ${vc}" style="font-size:10px">${v.ver}${icon}</span></div>
      <div style="font-size:12px;${sc?'text-decoration:line-through;opacity:.6;color:var(--red)':''}">
        ${v.avail.toLocaleString()} 本
        <span style="font-size:10px;color:${sc?'var(--red)':'var(--grn)'};margin-left:4px">${sc?'✗ 不計入':'✓ 計入'}</span>
      </div></div>`;
  }
  if (!detRows) detRows = `<div style="font-size:12px;color:var(--lgt);padding:6px">所有版次庫存為零</div>`;

  const dispName = tab==='nsp' ? p.name.replace('非賣品','') : p.name;
  const nspBadge = tab==='nsp' ? `<span style="font-size:10px;color:var(--lgt);font-weight:400"> 非賣品</span>` : '';

  return `<tr class="${rowCls}">
    <td><div class="pn">${subjTagHtml(p.subject,crossSubj)}${dispName}${nspBadge}</div><div class="psku">${p.sku}</div></td>
    <td><div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">
      ${verTagsHtml}
      <button class="exp-btn" onclick="toggleVD('${did}',this)">▶ 版次明細</button>
    </div></td>
    <td class="stk"><div class="sw">
      <span class="sn ${snCls}">${usable.toLocaleString()}</span>
      ${hasSc?`<span style="font-size:10px;color:var(--lgt)">/${totalAvail.toLocaleString()}總</span>`:''}
      <div class="bar"><div class="bi ${barCls}" style="width:${pct}%"></div></div>
    </div></td>
    <td><div class="tiw"><input class="ti" type="number" value="${th}" min="1"
      onchange="setRowTh('${p.sku}',this.value)"
      onkeydown="if(event.key==='Enter')setRowTh('${p.sku}',this.value)">
      <span style="font-size:10px;color:var(--lgt)">本</span></div></td>
    <td>${pillHtml(st)}${hasSc?`<br><span class="pill p-p" style="margin-top:3px;font-size:9px">⚠報廢有庫存</span>`:''}</td>
  </tr>
  <tr style="display:none" id="tr_${did}"><td colspan="5" style="padding:0">
    <div class="vd" id="${did}">${detRows}</div>
  </td></tr>`;
}

function toggleVD(id, btn) {
  const el = document.getElementById(id);
  const tr = document.getElementById('tr_'+id);
  const open = el.classList.toggle('open');
  tr.style.display = open ? '' : 'none';
  btn.textContent = open ? '▼ 收起' : '▶ 版次明細';
}

// ── FILE LOADING ──
function loadInv(e) {
  const file = e.target.files[0]; if (!file) return;
  const dm = file.name.match(/(\d{4,8})/);
  if (dm) { const d=dm[1].padStart(8,'0'); invDate=`${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`; }
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext==='txt') {
    // SAP 匯出的 Big5 TAB 分隔文字，格式與 .xls 相同
    const r=new FileReader(); r.onload=ev=>parseSAP_big5(ev.target.result); r.readAsText(file,'Big5');
  } else if (ext==='xls'||ext==='xlsx') {
    const r=new FileReader(); r.onload=ev=>{
      const b=new Uint8Array(ev.target.result);
      if (b[0]===0xFF&&b[1]===0xFE) parseSAP(new TextDecoder('utf-16le').decode(ev.target.result));
      else doXLSX(file);
    }; r.readAsArrayBuffer(file);
  } else { const r=new FileReader(); r.onload=ev=>parseCSV(ev.target.result); r.readAsText(file,'Big5'); }
  e.target.value='';
}

function parseSAP_big5(text) {
  // SAP .txt Big5 格式：TAB 分隔，col0=料號, col3=品名, col7=版次, col12=可用量
  // 與 UTF-16 .xls 格式相同，直接複用 parseSAP 邏輯
  parseSAP(text.replace(/\r/g, ''));
}

function parseSAP(text) {
  const inv={};
  for (const line of text.split('\r\n')) {
    const c=line.split('\t');
    const sku=(c[0]||'').replace(/\uFEFF/g,'').trim();
    if (!sku||!/^\d{10}$/.test(sku)) continue;
    const ver=(c[7]||'').trim();
    const av=Math.max(0,parseInt(String(c[12]||0).replace(/,/g,''))||0);
    if (!inv[sku]) inv[sku]={};
    inv[sku][ver]=(inv[sku][ver]||0)+av;
  }
  applyInv(inv);
}
function parseCSV(text) {
  const lines=text.split('\n').filter(l=>l.trim());
  const hdr=lines[0].split(',').map(h=>h.trim());
  const iS=hdr.findIndex(h=>h.includes('物料號碼')), iV=hdr.findIndex(h=>h.includes('版次'));
  const iA=hdr.findIndex(h=>h.includes('庫存量')||h.includes('可用'));
  if (iS<0||iA<0){alert('找不到欄位');return;}
  const inv={};
  for (const l of lines.slice(1)) {
    const c=l.split(',');
    const sku=(c[iS]||'').trim(), ver=(c[iV]||'').trim();
    const av=parseInt((c[iA]||'0').replace(/,/g,''))||0;
    if (!sku) continue;
    if (!inv[sku]) inv[sku]={};
    inv[sku][ver]=(inv[sku][ver]||0)+av;
  }
  applyInv(inv);
}
function doXLSX(file) {
  const go=()=>{ const r=new FileReader(); r.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    const hdr=rows[0].map(h=>String(h||'').trim());
    const iS=hdr.findIndex(h=>h.includes('物料號碼')), iV=hdr.findIndex(h=>h.includes('版次'));
    const iA=hdr.findIndex(h=>h.includes('庫存量')||h.includes('可用'));
    if (iS<0||iA<0){alert('找不到欄位');return;}
    const inv={};
    for (const rr of rows.slice(1)) {
      const sku=String(rr[iS]||'').trim(), ver=String(rr[iV]||'').trim();
      const av=parseInt(String(rr[iA]||0).replace(/,/g,''))||0;
      if (!sku) continue;
      if (!inv[sku]) inv[sku]={};
      inv[sku][ver]=(inv[sku][ver]||0)+av;
    }
    applyInv(inv);
  }; r.readAsArrayBuffer(file); };
  if (typeof XLSX==='undefined'){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=go;document.head.appendChild(s);}else go();
}
function applyInv(inv) {
  let n=0;
  for (const p of PRODS) {
    const sk=inv[p.sku]; if (!sk) continue;
    p.versions=p.versions.map(v=>({ver:v.ver, avail:sk[v.ver]!=null?sk[v.ver]:v.avail}));
    n++;
  }
  invLoaded=true; render(); toast(`✅ 庫存更新：${n} 個料號`);
}

function loadRev(e) {
  const file=e.target.files[0]; if (!file) return;
  revLabel=file.name.replace(/\.xlsx$/,'');
  const go=()=>{ const r=new FileReader(); r.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'array'});
    const newR={ref:{},supp:{}};
    for (const sn of wb.SheetNames) {
      const ws=wb.Sheets[sn];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      if (sn.includes('參考書')) parseRevRef(rows, newR.ref);
      else if (sn.includes('版')||sn.includes('補充')) parseRevSupp(rows, newR.supp);
    }
    if (Object.keys(newR.ref).length>0||Object.keys(newR.supp).length>0) {
      Object.assign(REV.ref, newR.ref); Object.assign(REV.supp, newR.supp);
      revLoaded=true; render();
      toast(`✅ 修訂對照表更新`);
    } else toast('⚠ 找不到修訂資料，請確認工作表名稱');
  }; r.readAsArrayBuffer(file); };
  if (typeof XLSX==='undefined'){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=go;document.head.appendChild(s);}else go();
  e.target.value='';
}
function parseRevRef(rows, out) {
  for (const r of rows.slice(6)) {
    const sS=String(r[3]||'').trim(), sT=String(r[4]||'').trim();
    if (!sS||sS==='-'||sS==='undefined') continue;
    const entry={old_ver:String(r[10]||'').trim(), treatment:String(r[14]||'').trim(), new_ver:String(r[23]||'').trim()};
    out[sS]=entry;
    if (sT&&sT!=='-'&&sT!=='undefined') out[sT]=entry;
  }
}
function parseRevSupp(rows, out) {
  let hi=-1;
  for (let i=0;i<rows.length;i++) if (String(rows[i][4]||'')===String(11)){hi=i;break;}
  if (hi<0) return;
  const VC={'11':{混用:13,限區:14,報廢:15},'21':{混用:16,限區:17,報廢:18},'31':{混用:19,限區:20,報廢:21},'41':{混用:22,限區:23,報廢:24}};
  for (const r of rows.slice(hi+1)) {
    const sku=String(r[3]||'').trim();
    if (!sku||sku==='undefined'||sku.length<8) continue;
    const vm={};
    for (const [ver,cols] of Object.entries(VC)) {
      for (const [action,col] of Object.entries(cols)) {
        const val=r[col];
        if (val&&String(val).trim()&&!String(val).includes('openpyxl')){vm[ver]=action;break;}
      }
    }
    if (Object.keys(vm).length>0) out[sku]=vm;
  }
}

// INIT
render();
</script>
